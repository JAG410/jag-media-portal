<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D12 Media Upload</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="D12 Upload">
  <meta name="theme-color" content="#000000">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #f5f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 500px;
      margin-top: 20px;
      flex: 1;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .header p {
      font-size: 14px;
      color: #86868b;
      margin-top: 6px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #f5f5f7;
      margin-bottom: 6px;
    }
    label .hint {
      font-weight: 400;
      color: #86868b;
      font-size: 13px;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #333;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      background: #1c1c1e;
      color: #f5f5f7;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: #0a84ff;
    }
    input[type="text"]::placeholder, textarea::placeholder {
      color: #636366;
    }
    textarea { resize: vertical; min-height: 70px; }

    .file-upload {
      border: 2px dashed #333;
      border-radius: 12px;
      padding: 30px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #1c1c1e;
    }
    .file-upload:hover, .file-upload.dragover {
      border-color: #0a84ff;
      background: #0a84ff10;
    }
    .file-upload.has-file {
      border-color: #30d158;
      background: #30d15810;
    }
    .file-upload-icon { font-size: 36px; margin-bottom: 8px; }
    .file-upload-text { font-size: 15px; color: #86868b; }
    .file-upload input[type="file"] { display: none; }

    .file-list {
      margin-top: 12px;
      text-align: left;
    }
    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #2c2c2e;
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .file-item-info {
      flex: 1;
      min-width: 0;
    }
    .file-item-name {
      color: #f5f5f7;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-item-size {
      color: #86868b;
      font-size: 12px;
    }
    .file-item-warn {
      color: #ff9f0a;
      font-size: 11px;
    }
    .file-item-remove {
      color: #ff453a;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 0 0 0 12px;
      line-height: 1;
    }
    .file-count {
      font-size: 13px;
      color: #86868b;
      margin-top: 8px;
      text-align: center;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #0a84ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 10px;
    }
    .submit-btn:hover { background: #0077ed; }
    .submit-btn:disabled {
      background: #333;
      color: #636366;
      cursor: not-allowed;
    }

    .status {
      text-align: center;
      margin-top: 16px;
      font-size: 15px;
      min-height: 24px;
    }
    .status.success { color: #30d158; font-weight: 600; }
    .status.error { color: #ff453a; }
    .status.uploading { color: #0a84ff; }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #0a84ff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-bar-container {
      width: 100%;
      background: #2c2c2e;
      border-radius: 6px;
      margin-top: 12px;
      overflow: hidden;
      height: 6px;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: #0a84ff;
      border-radius: 6px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .upload-more-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: #0a84ff;
      border: 1px solid #0a84ff;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 10px;
      display: none;
    }
    .upload-more-btn:hover {
      background: #0a84ff15;
    }

    .footer {
      text-align: center;
      padding: 30px 0 10px;
      width: 100%;
      max-width: 500px;
    }
    .footer-line {
      width: 40px;
      height: 1px;
      background: #333;
      margin: 0 auto 12px;
    }
    .footer p {
      font-size: 12px;
      color: #48484a;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>D12 Media Upload</h1>
      <p>Upload photos and videos for District 12 social media</p>
    </div>

    <form id="uploadForm">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="uploaderName" placeholder="e.g. Christina, Mike, Delegate Carter">
      </div>

      <div class="form-group">
        <div class="file-upload" id="dropZone">
          <div class="file-upload-icon">📎</div>
          <div class="file-upload-text">Tap to choose photos or videos</div>
          <input type="file" id="fileInput" accept="image/*,video/*" multiple>
        </div>
        <div class="file-list" id="fileList"></div>
        <div class="file-count" id="fileCount"></div>
      </div>

      <div class="form-group">
        <label>What's this from?</label>
        <input type="text" id="description" placeholder="e.g. Harbor cleanup event, Council meeting">
      </div>

      <div class="form-group">
        <label>Anyone notable present? <span class="hint">(for tagging)</span></label>
        <input type="text" id="vips" placeholder="e.g. Mayor Scott, Sen. Jones, Director Smith">
      </div>

      <div class="form-group">
        <label>Event / Location</label>
        <input type="text" id="event" placeholder="e.g. City Hall, Inner Harbor, District 12 Office">
      </div>

      <div class="form-group">
        <label>Anything else to know?</label>
        <textarea id="notes" placeholder="Optional — any extra context for the post"></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Submit to D12</button>
      <div class="progress-bar-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="status" id="status"></div>
      <button type="button" class="upload-more-btn" id="uploadMoreBtn">Upload Another Batch</button>
    </form>
  </div>

  <div class="footer">
    <div class="footer-line"></div>
    <p>Johnson Advisory Group</p>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyoi-yOok3e_dhO5zz_UxjLMeo0eujHfT5FOtR5LF5L5WCGIjEwJeaFoU-0hhFr1_tUmQ/exec';

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileListEl = document.getElementById('fileList');
    const fileCountEl = document.getElementById('fileCount');
    const form = document.getElementById('uploadForm');
    const submitBtn = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const uploadMoreBtn = document.getElementById('uploadMoreBtn');
    const uploaderNameInput = document.getElementById('uploaderName');

    let selectedFiles = [];
    const LARGE_FILE_MB = 25;

    // Remember uploader name
    const savedName = localStorage.getItem('jag_uploader_name');
    if (savedName) uploaderNameInput.value = savedName;

    // File selection
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) {
        addFiles(e.dataTransfer.files);
      }
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) addFiles(fileInput.files);
    });

    function addFiles(fileListObj) {
      for (let i = 0; i < fileListObj.length; i++) {
        const file = fileListObj[i];
        // Avoid duplicates by name+size
        const isDupe = selectedFiles.some(f => f.name === file.name && f.size === file.size);
        if (!isDupe) selectedFiles.push(file);
      }
      renderFileList();
      // Reset input so same file can be re-added after removal
      fileInput.value = '';
    }

    function removeFile(index) {
      selectedFiles.splice(index, 1);
      renderFileList();
    }

    function renderFileList() {
      if (selectedFiles.length === 0) {
        fileListEl.innerHTML = '';
        fileCountEl.textContent = '';
        dropZone.classList.remove('has-file');
        dropZone.querySelector('.file-upload-text').textContent = 'Tap to choose photos or videos';
        return;
      }

      dropZone.classList.add('has-file');
      dropZone.querySelector('.file-upload-text').textContent = 'Tap to add more';

      let html = '';
      selectedFiles.forEach((file, i) => {
        const sizeMB = file.size / 1048576;
        const isLarge = sizeMB > LARGE_FILE_MB;
        html += '<div class="file-item">'
          + '<div class="file-item-info">'
          + '<div class="file-item-name">' + escapeHtml(file.name) + '</div>'
          + '<div class="file-item-size">' + formatSize(file.size)
          + (isLarge ? ' <span class="file-item-warn">Large file — may take a moment</span>' : '')
          + '</div>'
          + '</div>'
          + '<button type="button" class="file-item-remove" onclick="removeFile(' + i + ')">&times;</button>'
          + '</div>';
      });
      fileListEl.innerHTML = html;

      const totalSize = selectedFiles.reduce((sum, f) => sum + f.size, 0);
      fileCountEl.textContent = selectedFiles.length + ' file' + (selectedFiles.length === 1 ? '' : 's')
        + ' selected (' + formatSize(totalSize) + ' total)';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // Submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (selectedFiles.length === 0) {
        status.textContent = 'Please choose at least one photo or video.';
        status.className = 'status error';
        return;
      }

      const uploaderName = uploaderNameInput.value.trim();
      if (!uploaderName) {
        status.textContent = 'Please enter your name.';
        status.className = 'status error';
        uploaderNameInput.focus();
        return;
      }

      // Save name for next time
      localStorage.setItem('jag_uploader_name', uploaderName);

      submitBtn.disabled = true;
      uploadMoreBtn.style.display = 'none';
      progressContainer.style.display = 'block';
      progressBar.style.width = '0%';
      status.innerHTML = '<span class="spinner"></span> Uploading file 1 of ' + selectedFiles.length + '...';
      status.className = 'status uploading';

      try {
        // Convert all files to base64
        const files = [];
        for (let i = 0; i < selectedFiles.length; i++) {
          status.innerHTML = '<span class="spinner"></span> Preparing file ' + (i + 1) + ' of ' + selectedFiles.length + '...';
          const base64 = await toBase64(selectedFiles[i]);
          files.push({
            data: base64,
            name: selectedFiles[i].name,
            mimeType: selectedFiles[i].type
          });
          progressBar.style.width = Math.round(((i + 1) / selectedFiles.length) * 50) + '%';
        }

        status.innerHTML = '<span class="spinner"></span> Uploading to Drive...';
        progressBar.style.width = '60%';

        const payload = {
          files: files,
          uploaderName: uploaderName,
          description: document.getElementById('description').value,
          vips: document.getElementById('vips').value,
          event: document.getElementById('event').value,
          notes: document.getElementById('notes').value
        };

        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        progressBar.style.width = '90%';
        const result = await response.json();

        if (result.success) {
          progressBar.style.width = '100%';
          status.textContent = selectedFiles.length + ' file' + (selectedFiles.length === 1 ? '' : 's') + ' submitted! Thank you, ' + uploaderName + '.';
          status.className = 'status success';

          // Reset form but keep name
          selectedFiles = [];
          renderFileList();
          document.getElementById('description').value = '';
          document.getElementById('vips').value = '';
          document.getElementById('event').value = '';
          document.getElementById('notes').value = '';

          // Show upload more button
          uploadMoreBtn.style.display = 'block';

          setTimeout(() => {
            progressContainer.style.display = 'none';
          }, 1500);
        } else {
          throw new Error(result.error || 'Upload failed');
        }
      } catch (err) {
        status.textContent = 'Upload failed — please try again.';
        status.className = 'status error';
        progressContainer.style.display = 'none';
        console.error(err);
      } finally {
        submitBtn.disabled = false;
      }
    });

    // Upload More — resets everything except the name
    uploadMoreBtn.addEventListener('click', () => {
      uploadMoreBtn.style.display = 'none';
      status.textContent = '';
      status.className = 'status';
      progressContainer.style.display = 'none';
      progressBar.style.width = '0%';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
